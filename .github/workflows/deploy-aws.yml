name: Deploy VLegal AI to AWS

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: vlegal-prod
  ECS_CLUSTER: vlegal-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push immutable image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --pull -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Run database migration task
        env:
          PRIVATE_SUBNETS: ${{ secrets.ECS_PRIVATE_SUBNETS }}
          SECURITY_GROUP: ${{ secrets.ECS_SECURITY_GROUP }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "${ECS_CLUSTER}-migrate" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$PRIVATE_SUBNETS],securityGroups=[$SECURITY_GROUP],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)
          test "$EXIT_CODE" = "0"

      - name: Roll ECS services
        run: |
          aws ecs update-service --cluster "$ECS_CLUSTER" --service api --force-new-deployment >/dev/null
          aws ecs update-service --cluster "$ECS_CLUSTER" --service worker --force-new-deployment >/dev/null
          aws ecs update-service --cluster "$ECS_CLUSTER" --service beat --force-new-deployment >/dev/null
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services api worker beat
