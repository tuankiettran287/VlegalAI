name: Deploy VLegal AI with Docker

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, frontend, worker, beat, migrate, model-init]
    steps:
      - uses: actions/checkout@v4

      - name: Validate production Compose file
        env:
          APP_ENV_FILE: .env.production.example
        run: docker compose --env-file .env.production.example -f compose.production.yml config --quiet

      - name: Set image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy image to Docker host
        if: env.DEPLOY_HOST != ''
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/vlegal' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          : "${DEPLOY_USER:?Set the DEPLOY_USER secret}"
          : "${DEPLOY_SSH_KEY:?Set the DEPLOY_SSH_KEY secret}"
          : "${DEPLOY_KNOWN_HOSTS:?Set the DEPLOY_KNOWN_HOSTS secret}"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/deploy_key" "$HOME/.ssh/known_hosts"
          SSH=(ssh -i "$HOME/.ssh/deploy_key" -p "$DEPLOY_PORT" -o BatchMode=yes)
          SCP=(scp -i "$HOME/.ssh/deploy_key" -P "$DEPLOY_PORT" -o BatchMode=yes)
          IMAGE_BASE="ghcr.io/${GITHUB_REPOSITORY,,}"
          "${SSH[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          "${SCP[@]}" compose.production.yml Caddyfile scripts/deploy-docker.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          "${SSH[@]}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && chmod +x deploy-docker.sh && \
             VLEGAL_API_IMAGE='$IMAGE_BASE-api:$GITHUB_SHA' \
             VLEGAL_FRONTEND_IMAGE='$IMAGE_BASE-frontend:$GITHUB_SHA' \
             VLEGAL_WORKER_IMAGE='$IMAGE_BASE-worker:$GITHUB_SHA' \
             VLEGAL_BEAT_IMAGE='$IMAGE_BASE-beat:$GITHUB_SHA' \
             VLEGAL_MIGRATE_IMAGE='$IMAGE_BASE-migrate:$GITHUB_SHA' \
             VLEGAL_MODEL_INIT_IMAGE='$IMAGE_BASE-model-init:$GITHUB_SHA' \
             PULL_IMAGE=1 ./deploy-docker.sh"

      - name: Deployment not configured
        if: env.DEPLOY_HOST == ''
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: echo "Image was pushed to GHCR; set DEPLOY_* secrets to enable server deployment."
