name: vlegal

x-app-environment: &app-environment
  DATABASE_URL: postgresql+asyncpg://vlegal:vlegal@postgres:5432/vlegal
  POSTGRES_VECTOR_SIZE: "1536"
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: local-neo4j-password
  QWEN_MODEL_PATH: /models/qwen3
  QWEN_DEVICE: auto

services:
  model-init:
    image: "${VLEGAL_MODEL_INIT_IMAGE:-vlegal-model-init:local}"
    build:
      context: .
      dockerfile: docker/model-init.Dockerfile
    env_file: .env
    environment:
      HF_HUB_OFFLINE: "0"
      TRANSFORMERS_OFFLINE: "0"
      QWEN_MODEL_PATH: /models/qwen3
      QWEN_MODEL_REPO: "${QWEN_MODEL_REPO:-Qwen/Qwen3-14B}"
      QWEN_MODEL_REVISION: "${QWEN_MODEL_REVISION:-main}"
    user: "0:0"
    volumes:
      - qwen_model:/models/qwen3
    restart: "no"

  migrate:
    image: "${VLEGAL_MIGRATE_IMAGE:-vlegal-migrate:local}"
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vlegal:vlegal@postgres:5432/vlegal
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: "${VLEGAL_API_IMAGE:-vlegal-api:local}"
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    environment:
      <<: *app-environment
    volumes:
      - qwen_model:/models/qwen3:ro
    ports:
      - "8000:8080"
    depends_on:
      model-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: "${VLEGAL_FRONTEND_IMAGE:-vlegal-frontend:local}"
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      PORT: "8080"
      API_UPSTREAM: http://api:8080
    ports:
      - "5173:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: "${VLEGAL_WORKER_IMAGE:-vlegal-worker:local}"
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    environment:
      <<: *app-environment
    volumes:
      - qwen_model:/models/qwen3:ro
    depends_on:
      model-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  beat:
    image: "${VLEGAL_BEAT_IMAGE:-vlegal-beat:local}"
    build:
      context: .
      dockerfile: docker/beat.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vlegal:vlegal@postgres:5432/vlegal
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    environment:
      POSTGRES_DB: vlegal
      POSTGRES_USER: vlegal
      POSTGRES_PASSWORD: vlegal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vlegal -d vlegal"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/local-neo4j-password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  qwen_model:
  postgres_data:
  redis_data:
  neo4j_data:
