x-app-image: &app-image
  image: "${VLEGAL_IMAGE:-vlegal-ai:local}"
  build:
    context: .

services:
  model-init:
    <<: *app-image
    command: ["python", "scripts/download_qwen_model.py", "--output-dir", "/models/qwen3"]
    env_file: .env
    environment:
      HF_HUB_OFFLINE: "0"
      TRANSFORMERS_OFFLINE: "0"
      QWEN_MODEL_PATH: /models/qwen3
      QWEN_MODEL_REPO: ${QWEN_MODEL_REPO:-Qwen/Qwen3-14B}
      QWEN_MODEL_REVISION: ${QWEN_MODEL_REVISION:-main}
    user: "0:0"
    healthcheck:
      disable: true
    volumes:
      - qwen_model:/models/qwen3
    restart: "no"

  api:
    <<: *app-image
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vlegal:vlegal@postgres:5432/vlegal
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: local-neo4j-password
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: local-qdrant-key
      QWEN_MODEL_PATH: /models/qwen3
      QWEN_DEVICE: auto
    volumes:
      - qwen_model:/models/qwen3:ro
    ports:
      - "8000:8000"
    depends_on:
      model-init: { condition: service_completed_successfully }
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      neo4j: { condition: service_healthy }
      qdrant: { condition: service_started }
    restart: unless-stopped

  worker:
    <<: *app-image
    command: celery -A app.worker.celery_app worker --loglevel=INFO --concurrency=1
    healthcheck:
      disable: true
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vlegal:vlegal@postgres:5432/vlegal
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: local-neo4j-password
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: local-qdrant-key
      QWEN_MODEL_PATH: /models/qwen3
      QWEN_DEVICE: auto
    volumes:
      - qwen_model:/models/qwen3:ro
    depends_on:
      model-init: { condition: service_completed_successfully }
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    restart: unless-stopped

  migrate:
    <<: *app-image
    command: alembic upgrade head
    healthcheck:
      disable: true
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vlegal:vlegal@postgres:5432/vlegal
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  beat:
    <<: *app-image
    command: celery -A app.worker.celery_app beat --loglevel=INFO
    healthcheck:
      disable: true
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vlegal:vlegal@postgres:5432/vlegal
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vlegal
      POSTGRES_USER: vlegal
      POSTGRES_PASSWORD: vlegal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vlegal -d vlegal"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/local-neo4j-password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.15.3
    environment:
      QDRANT__SERVICE__API_KEY: local-qdrant-key
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qwen_model:
  postgres_data:
  redis_data:
  neo4j_data:
  qdrant_data:
